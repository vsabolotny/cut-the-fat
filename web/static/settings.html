<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einstellungen — Cut the Fat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="settings-app">

    <!-- Global Top Navigation Bar -->
    <header id="topbar">
      <div id="topbar-left">
        <a href="/" class="logo">&#9986; Cut the Fat</a>
      </div>
      <nav id="topbar-center">
        <a href="/" class="topbar-nav-link">Chat</a>
        <a href="/transactions" class="topbar-nav-link">Transaktionen</a>
        <a href="/settings" class="topbar-nav-link active">Einstellungen</a>
      </nav>
      <div id="topbar-right"></div>
    </header>

    <div id="settings-page">

      <div class="settings-page-col">

        <!-- Profil -->
        <section class="settings-page-section">
          <div class="settings-page-section-title">Profil</div>
          <div class="settings-field">
            <label class="settings-label">Name</label>
            <input id="s-name" type="text" class="settings-input" placeholder="Paul Wilke">
          </div>
          <div class="settings-field">
            <label class="settings-label">E-Mail</label>
            <input id="s-email" type="email" class="settings-input" placeholder="paul@beispiel.de">
          </div>
        </section>

        <!-- API Keys -->
        <section class="settings-page-section">
          <div class="settings-page-section-title">API Keys</div>

          <div class="settings-field">
            <label class="settings-label">
              Anthropic API Key
              <span id="s-anthropic-pill" class="settings-key-pill off">nicht gesetzt</span>
            </label>
            <div class="settings-input-row">
              <input id="s-anthropic-key" type="password" class="settings-input" placeholder="sk-ant-...">
              <button class="settings-eye-btn" data-target="s-anthropic-key" title="Anzeigen/Verstecken">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="settings-hint">Für KI-Kategorisierung und Sparempfehlungen. Gespeichert in <code>.env</code>.</div>
          </div>

          <div class="settings-field">
            <label class="settings-label">
              GitHub Token
              <span id="s-github-pill" class="settings-key-pill off">nicht gesetzt</span>
            </label>
            <div class="settings-input-row">
              <input id="s-github-token" type="password" class="settings-input" placeholder="ghp_...">
              <button class="settings-eye-btn" data-target="s-github-token" title="Anzeigen/Verstecken">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="settings-hint">Optional. Für Bug-Reports aus der Desktop-App. Gespeichert in <code>.env</code>.</div>
          </div>
        </section>

        <!-- App -->
        <section class="settings-page-section">
          <div class="settings-page-section-title">App</div>
          <div class="settings-field">
            <label class="settings-label">Datenbank</label>
            <div class="settings-info" id="s-db-path">backend/cut_the_fat.db</div>
          </div>
          <div class="settings-field">
            <label class="settings-label">Version</label>
            <div class="settings-info" id="s-version">…</div>
          </div>
          <div id="s-bug-report-row" class="settings-field hidden">
            <label class="settings-label">Bug melden</label>
            <button id="bug-report-btn" class="settings-action-btn">&#128027; Bug Report erstellen</button>
          </div>
        </section>

        <div class="settings-page-footer">
          <button id="settings-cancel" class="settings-btn-secondary">Abbrechen</button>
          <button id="settings-save" class="settings-btn-primary">Speichern</button>
        </div>

      </div>
    </div>

    <!-- Bug Report Modal -->
    <div id="bug-modal" class="bug-modal-overlay hidden">
      <div class="bug-modal">
        <h3 class="bug-modal-title">&#128027; Bug melden</h3>
        <input id="bug-title" type="text" class="bug-modal-input" placeholder="Kurzbeschreibung...">
        <textarea id="bug-desc" rows="3" class="bug-modal-input" placeholder="Was ist passiert?"></textarea>
        <textarea id="bug-steps" rows="2" class="bug-modal-input" placeholder="Schritte zur Reproduktion (optional)"></textarea>
        <label class="bug-modal-checkbox">
          <input id="bug-include-log" type="checkbox">
          <span>
            Chat-Verlauf anhängen <span class="bug-modal-warning">(enthält Händler &amp; Kategorien, Beträge werden maskiert)</span>
          </span>
        </label>
        <div class="bug-modal-actions">
          <button id="bug-cancel" class="bug-modal-cancel">Abbrechen</button>
          <button id="bug-submit" class="bug-modal-submit">Senden</button>
        </div>
      </div>
    </div>

  </div>

  <script src="topbar.js"></script>
  <script src="settings.js"></script>
</body>
</html>
