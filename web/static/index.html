<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cut the Fat</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="app" data-current-month="2026-03" data-last-intent="">

    <!-- Left: Chat Panel -->
    <aside id="chat-panel">
      <div class="panel-header">
        <div class="logo">&#9986; Cut the Fat</div>
        <a href="/transactions" class="nav-link">Transaktionen &#8594;</a>
      </div>

      <div id="chat-messages" role="log" aria-live="polite"></div>

      <div id="chat-footer">
        <div id="drop-zone" class="drop-zone hidden">
          <span>Datei hier ablegen</span>
        </div>
        <form id="input-form">
          <label id="attach-btn" title="Datei importieren">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            <input type="file" id="file-input" accept=".csv,.xlsx,.xls,.pdf" hidden>
          </label>
          <input type="text" id="msg-input" placeholder="Nachricht eingeben..." autocomplete="off" autofocus>
          <button type="submit" id="send-btn" title="Senden">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </form>
      </div>
    </aside>

    <!-- Right: Content Panel -->
    <main id="content-panel">
      <div id="content-header" class="hidden"></div>
      <div id="content-area">
        <!-- Welcome state -->
        <div id="welcome" class="welcome">
          <h2>&#9986; Willkommen</h2>
          <p>Schreibe links eine Nachricht oder w&auml;hle eine Aktion.</p>
          <div class="quick-grid">
            <button class="quick-card" data-q="Zeig mir meine Ausgaben">
              <span class="quick-icon">&#128202;</span>
              <span>Ausgaben&uuml;bersicht</span>
            </button>
            <button class="quick-card" data-q="Vergleich mit Vormonat">
              <span class="quick-icon">&#128260;</span>
              <span>Monatsvergleich</span>
            </button>
            <button class="quick-card" data-q="Zeig den Trend">
              <span class="quick-icon">&#128200;</span>
              <span>Ausgaben-Trend</span>
            </button>
            <button class="quick-card" data-q="Wo kann ich sparen?">
              <span class="quick-icon">&#128161;</span>
              <span>Sparempfehlungen</span>
            </button>
            <button class="quick-card" data-q="Unkategorisierte H&auml;ndler">
              <span class="quick-icon">&#127991;</span>
              <span>Kategorien pr&uuml;fen</span>
            </button>
            <button class="quick-card" data-q="Bericht erstellen">
              <span class="quick-icon">&#128196;</span>
              <span>Bericht generieren</span>
            </button>
          </div>
        </div>

        <!-- Dynamic content sections -->
        <section id="content-primary" class="hidden"></section>
        <section id="content-secondary" class="hidden"></section>
        <section id="content-actions" class="hidden"></section>
      </div>
    </main>

    <!-- Settings Button (immer sichtbar) -->
    <button id="settings-btn" title="Einstellungen" style="position:fixed; bottom:18px; left:18px; width:44px; height:44px; border-radius:50%; border:1px solid #2e3348; background:#1a1d27; color:#8b8fa8; font-size:20px; cursor:pointer; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,0.4);">⚙</button>

    <!-- Settings Modal -->
    <div id="settings-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; justify-content:center; align-items:center;">
      <div style="background:#1a1d27; border:1px solid #2e3348; border-radius:12px; padding:24px; width:440px; max-width:90vw;">
        <h3 style="margin:0 0 16px; font-size:16px; color:#e4e6f0;">⚙ Einstellungen</h3>
        <label style="display:block; font-size:12px; color:#8b8fa8; margin-bottom:6px;">Anthropic API Key</label>
        <input id="settings-apikey" type="password" placeholder="sk-ant-..." style="width:100%; padding:8px 12px; margin-bottom:6px; background:#0f1117; border:1px solid #2e3348; border-radius:8px; color:#e4e6f0; font-size:13px; box-sizing:border-box;">
        <div id="settings-apikey-status" style="font-size:11px; color:#8b8fa8; margin-bottom:14px;"></div>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
          <button id="settings-cancel" style="padding:6px 16px; border-radius:16px; border:1px solid #2e3348; background:#242836; color:#8b8fa8; font-size:12px; cursor:pointer;">Abbrechen</button>
          <button id="settings-save" style="padding:6px 16px; border-radius:16px; border:1px solid #6366f1; background:rgba(99,102,241,0.15); color:#6366f1; font-size:12px; cursor:pointer;">Speichern</button>
        </div>
      </div>
    </div>

    <!-- Bug Report Button (nur in Tauri Desktop-App sichtbar) -->
    <button id="bug-report-btn" title="Bug melden" style="display:none; position:fixed; bottom:18px; right:18px; width:44px; height:44px; border-radius:50%; border:1px solid #2e3348; background:#1a1d27; color:#f97316; font-size:20px; cursor:pointer; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,0.4);">🐛</button>

    <!-- Bug Report Modal -->
    <div id="bug-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; justify-content:center; align-items:center;">
      <div style="background:#1a1d27; border:1px solid #2e3348; border-radius:12px; padding:24px; width:420px; max-width:90vw;">
        <h3 style="margin:0 0 16px; font-size:16px; color:#e4e6f0;">🐛 Bug melden</h3>
        <input id="bug-title" type="text" placeholder="Kurzbeschreibung..." style="width:100%; padding:8px 12px; margin-bottom:10px; background:#0f1117; border:1px solid #2e3348; border-radius:8px; color:#e4e6f0; font-size:13px;">
        <textarea id="bug-desc" placeholder="Was ist passiert?" rows="3" style="width:100%; padding:8px 12px; margin-bottom:10px; background:#0f1117; border:1px solid #2e3348; border-radius:8px; color:#e4e6f0; font-size:13px; resize:vertical;"></textarea>
        <textarea id="bug-steps" placeholder="Schritte zur Reproduktion (optional)" rows="2" style="width:100%; padding:8px 12px; margin-bottom:14px; background:#0f1117; border:1px solid #2e3348; border-radius:8px; color:#e4e6f0; font-size:13px; resize:vertical;"></textarea>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
          <button id="bug-cancel" style="padding:6px 16px; border-radius:16px; border:1px solid #2e3348; background:#242836; color:#8b8fa8; font-size:12px; cursor:pointer;">Abbrechen</button>
          <button id="bug-submit" style="padding:6px 16px; border-radius:16px; border:1px solid #6366f1; background:rgba(99,102,241,0.15); color:#6366f1; font-size:12px; cursor:pointer;">Senden</button>
        </div>
      </div>
    </div>

  </div>

  <script src="chat.js"></script>
</body>
</html>
